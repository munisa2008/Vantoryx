<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexa — Live Detector</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    #status { padding: 12px; border-radius: 8px; background: #f5f5f5; margin: 16px 0; min-height: 24px; }
    #transcript { white-space: pre-wrap; border: 1px solid #ddd; border-radius: 8px; padding: 16px; min-height: 80px; background: #fafafa; }
    #verdict { padding: 16px; border-radius: 8px; font-size: 1.4em; font-weight: bold; text-align: center; display: none; margin-top: 16px; }
    .safe { background: #d4edda; color: #155724; }
    .scam { background: #f8d7da; color: #721c24; }
    button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; }
    #startBtn { background: #28a745; color: white; }
    #stopBtn  { background: #dc3545; color: white; display: none; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; animation: blink 1s infinite; margin-right: 6px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
  <h1>🔍 Nexa — Детектор мошенников</h1>

  <div>
    <button id="startBtn" onclick="startRecording()">▶ Начать запись</button>
    <button id="stopBtn"  onclick="stopRecording()">⏹ Остановить</button>
  </div>

  <div id="status">Нажмите «Начать запись»</div>

  <h3>Транскрипция (в реальном времени):</h3>
  <div id="transcript"></div>

  <div id="verdict"></div>

  <script>
    let ws, mediaRecorder, stream;
    let lastChunkSent = Promise.resolve(); // промис отправки последнего чанка

    async function startRecording() {
      document.getElementById('verdict').style.display = 'none';
      document.getElementById('transcript').textContent = '';

      // Открываем WebSocket
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws/transcribe/`);

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        // Было
        if (data.type === 'partial') {
    // Заменяем весь блок текстом от Whisper (он уже накопленный)
          document.getElementById('transcript').textContent = data.full;
          document.getElementById('status').innerHTML = '<span class="dot"></span>Идёт запись и транскрипция...';
        }
        if (data.type === 'classifying') {
          document.getElementById('status').textContent = '🤖 Анализирую звонок...';
        }
        if (data.type === 'result') {
          const isScam = data.verdict.includes('мошенники');
          const verdictEl = document.getElementById('verdict');
          verdictEl.textContent = data.verdict;
          verdictEl.className = isScam ? 'scam' : 'safe';
          verdictEl.style.display = 'block';
          document.getElementById('status').textContent = 'Готово';
        }
      };

      ws.onopen = async () => {
        // Запрашиваем микрофон
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream, {
          mimeType: 'audio/webm;codecs=opus'
        });

        // Отправляем чанки каждые 5 секунд
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
            lastChunkSent = e.data.arrayBuffer().then(buffer => {
              ws.send(buffer);
            });
          }
        };

        // Отправляем stop ПОСЛЕ гарантированной отправки последнего чанка
        mediaRecorder.onstop = () => {
          lastChunkSent.then(() => {
            if (ws?.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: 'stop' }));
            }
          });
        };

        mediaRecorder.start(1000); // чанк каждые 5 сек

        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        document.getElementById('status').innerHTML = '<span class="dot"></span>Идёт запись...';
      };
    }

    function stopRecording() {
      mediaRecorder?.stop();
      stream?.getTracks().forEach(t => t.stop());

      document.getElementById('startBtn').style.display = 'inline-block';
      document.getElementById('stopBtn').style.display = 'none';
      document.getElementById('status').textContent = '⏳ Финальная обработка...';
    }
  </script>
</body>
</html>
